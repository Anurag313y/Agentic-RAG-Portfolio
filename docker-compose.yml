name: my-intelligent-portfolio

services:
  web:
    container_name: portfolio-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WRANGLER_VERSION: "4.95.0"
    ports:
      # Bind to 127.0.0.1 — reliable on Docker Desktop (Windows/macOS)
      - "127.0.0.1:8787:8787"
      - "127.0.0.1:5173:8787"
    env_file:
      - .dev.vars
    environment:
      PORT: "8787"
      NODE_ENV: development
      CI: "true"
    volumes:
      # Secrets — wrangler reads /app/.dev.vars directly
      - ./.dev.vars:/app/.dev.vars:ro
      # Persist local D1 + KV (RAG chunks, sessions, cache) across restarts
      - wrangler-state:/app/.wrangler/state
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/').then(r=>{if(!r.ok)process.exit(1);return r.text()}).then(()=>process.exit(0)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 6

volumes:
  wrangler-state:
    name: portfolio_wrangler_state
